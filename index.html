// ─── Subject Detection: "my emotion" vs "someone else's emotion" ───
// Person words (bare form) - these alone don't determine subject vs object
const PERSON_WORDS = [
  "친구","엄마","아빠","부모님","동생","형","오빠","언니","누나",
  "선생님","쌤","할머니","할아버지","그","그녀","걔","쟤","얘",
  "그애","그사람","애","애들","남자","여자","아이","사람",
  "팀원","동료","상대방","상대","짝꿍","반친구","옆자리",
];
// Subject particles → the person IS the subject → emotion belongs to THEM
const SUBJ_PARTICLES = ["가","이","는","은","도","께서","에서"];
// Object/companion particles → the person is NOT subject → emotion belongs to ME
const OBJ_PARTICLES = ["와","과","이랑","랑","하고","한테","에게","한테서","에게서","를","을","의","보다","처럼","같이","만나","때문에","때문","덕분에","덕분"];
// Self-reference: always means "my" emotion
const SELF_SUBJECTS = [
  "나","나는","나도","내가","나의","내",
  "저","저는","저도","제가","제",
  "본인","본인이","본인은",
  "스스로","스스로가",
];
const LOOK_BACK = 4;

function isOtherSubject(tokens, emotionIdx) {
  const start = Math.max(0, emotionIdx - LOOK_BACK);
  for (let i = start; i < emotionIdx; i++) {
    const t = tokens[i];

    // Self-reference found → definitely my emotion
    if (SELF_SUBJECTS.some(s => t === s || t.startsWith(s))) return false;

    // Check if token contains a person word
    const personMatch = PERSON_WORDS.find(p => t === p || t.startsWith(p));
    if (personMatch) {
      const suffix = t.slice(personMatch.length); // particle after the person word

      // No particle (bare word like "친구") → check next token for particle
      if (suffix === "") {
        const nextTok = i + 1 < tokens.length ? tokens[i + 1] : "";
        // If next token is an object/companion particle or starts with one
        if (OBJ_PARTICLES.some(op => nextTok === op || nextTok.startsWith(op))) return false;
        // If next token is a subject particle
        if (SUBJ_PARTICLES.some(sp => nextTok === sp)) return true;
        // Bare person word with no clear particle → ambiguous, treat as other's by default
        return true;
      }

      // Has object/companion particle attached → my emotion
      if (OBJ_PARTICLES.some(op => suffix === op || suffix.startsWith(op))) return false;

      // Has subject particle attached → other's emotion
      if (SUBJ_PARTICLES.some(sp => suffix === sp || suffix.startsWith(sp))) return true;

      // Particle not recognized → default to other's
      return true;
    }
  }
  // No person word found = diary default = about me
  return false;
}

function analyzeEntry(text) {
  const norm = normalizeKorean(text);
  const tokens = norm.split(" ").filter(Boolean);
  const hits = [];
  const excluded = []; // emotions detected but belonging to others
  const seen = new Set();

  for (let ti = 0; ti < tokens.length; ti++) {
    const tok = tokens[ti];
    const st = stemKorean(tok);
    for (const emo of EMOTIONS_28) {
      if (seen.has(emo.name)) continue;
      for (const kw of emo.kw) {
        const ks = stemKorean(kw);
        if ((st.length >= 2 && ks.length >= 2 && (st.includes(ks) || ks.startsWith(st))) || tok.includes(kw) || kw.startsWith(tok)) {
          seen.add(emo.name);
          const entry = { name: emo.name, label: emo.label, q: emo.q, val9: emo.val, aro9: emo.aro, valStd: ((emo.val - 1) / 8) * 2 - 1, aroStd: ((emo.aro - 1) / 8) * 2 - 1, token: tok };
          if (isOtherSubject(tokens, ti)) {
            excluded.push(entry);
          } else {
            hits.push(entry);
          }
          break;
        }
      }
    }
  }

  let posS = 0, negS = 0;
  const mP = [], mN = [];
  let w = 1;
  for (let ti = 0; ti < tokens.length; ti++) {
    const tok = tokens[ti];
    const st = stemKorean(tok);
    if (STRENGTH.strong.some(m => st === m || tok === m)) { w = 2; continue; }
    if (STRENGTH.weak.some(m => st === m || tok === m)) { w = 0.5; continue; }
    let f = false;
    for (const pw of POS_EXTRA) {
      const ps = stemKorean(pw);
      if ((st.length >= 2 && ps.length >= 2 && (st.includes(ps) || ps.startsWith(st))) || tok.includes(pw)) {
        // Check subject for extended lexicon too
        if (!isOtherSubject(tokens, ti)) {
          posS += w; mP.push({ word: pw, weight: w });
        }
        f = true; break;
      }
    }
    if (!f) {
      for (const nw of NEG_EXTRA) {
        const ns = stemKorean(nw);
        if ((st.length >= 2 && ns.length >= 2 && (st.includes(ns) || ns.startsWith(st))) || tok.includes(nw)) {
          if (!isOtherSubject(tokens, ti)) {
            negS += w; mN.push({ word: nw, weight: w });
          }
          f = true; break;
        }
      }
    }
    if (f) w = 1; else if (w !== 1) w = 1;
  }
  for (const h of hits) { if (h.val9 > 5) posS += 1; else if (h.val9 < 5) negS += 1; }
  const tot = posS + negS;
  const aV = hits.length ? hits.reduce((s, h) => s + h.val9, 0) / hits.length : 5;
  const aA = hits.length ? hits.reduce((s, h) => s + h.aro9, 0) / hits.length : 5;
  return { hits, excluded, matchedPos: mP, matchedNeg: mN, posScore: posS, negScore: negS, posPct: tot > 0 ? (posS / tot) * 100 : 0, negPct: tot > 0 ? (negS / tot) * 100 : 0, valence9: aV, arousal9: aA, valStd: ((aV - 1) / 8) * 2 - 1, aroStd: ((aA - 1) / 8) * 2 - 1 };
}

// Safe normalizer: Firebase may strip empty arrays or fields
function safeAnalysis(a) {
  if (!a) return { hits:[], excluded:[], matchedPos:[], matchedNeg:[], posScore:0, negScore:0, posPct:0, negPct:0, valence9:5, arousal9:5, valStd:0, aroStd:0 };
  return {
    hits: a.hits || [],
    excluded: a.excluded || [],
    matchedPos: a.matchedPos || [],
    matchedNeg: a.matchedNeg || [],
    posScore: a.posScore || 0,
    negScore: a.negScore || 0,
    posPct: a.posPct || 0,
    negPct: a.negPct || 0,
    valence9: a.valence9 || 5,
    arousal9: a.arousal9 || 5,
    valStd: a.valStd || 0,
    aroStd: a.aroStd || 0,
  };
}
function safeEntries(arr) {
  if (!arr || !Array.isArray(arr)) return [];
  return arr.map(function(e) { return { date: e.date || "", text: e.text || "", ts: e.ts || Date.now(), analysis: safeAnalysis(e.analysis) }; });
}

/* ═══════════ Circumplex ═══════════ */
function CircumplexChart({ entries, hovIdx, onHover }) {
  const cRef = useRef(null), conRef = useRef(null);
  const [tip, setTip] = useState(null);
  const [sz, setSz] = useState(480);
  useEffect(() => { const ro = new ResizeObserver(([e]) => setSz(Math.min(e.contentRect.width, 520))); if (conRef.current) ro.observe(conRef.current); return () => ro.disconnect(); }, []);
  const M = 52, rad = (sz - M * 2) / 2, cx = sz / 2, cy = sz / 2;
  const pts = useMemo(() => { const p = []; entries.forEach((en, ei) => { en.analysis.hits.forEach((h) => { p.push({ px: cx + h.valStd * rad, py: cy - h.aroStd * rad, ei, hit: h, date: en.date }); }); }); return p; }, [entries, sz, cx, cy, rad]);

  useEffect(() => {
    const cv = cRef.current; if (!cv) return;
    const dpr = window.devicePixelRatio || 1; cv.width = sz * dpr; cv.height = sz * dpr;
    const c = cv.getContext("2d"); c.scale(dpr, dpr); c.clearRect(0, 0, sz, sz);
    c.fillStyle = "#fafbfc"; c.fillRect(0, 0, sz, sz);
    [{ x: cx, y: cy - rad, w: rad, h: rad, cl: "rgba(232,135,60,0.04)" }, { x: cx - rad, y: cy - rad, w: rad, h: rad, cl: "rgba(224,112,112,0.04)" }, { x: cx - rad, y: cy, w: rad, h: rad, cl: "rgba(107,156,194,0.04)" }, { x: cx, y: cy, w: rad, h: rad, cl: "rgba(91,181,166,0.04)" }].forEach(q => { c.fillStyle = q.cl; c.fillRect(q.x, q.y, q.w, q.h); });
    [0.25, 0.5, 0.75, 1].forEach(s => { c.beginPath(); c.arc(cx, cy, rad * s, 0, Math.PI * 2); c.strokeStyle = s === 1 ? "rgba(0,0,0,0.12)" : "rgba(0,0,0,0.06)"; c.lineWidth = 1; c.stroke(); });
    c.strokeStyle = "rgba(0,0,0,0.15)"; c.lineWidth = 1.2; c.beginPath(); c.moveTo(cx - rad, cy); c.lineTo(cx + rad, cy); c.stroke(); c.beginPath(); c.moveTo(cx, cy - rad); c.lineTo(cx, cy + rad); c.stroke();
    c.font = "600 10px 'Pretendard',system-ui"; c.fillStyle = "rgba(0,0,0,0.25)"; c.textAlign = "center";
    c.fillText("활기·흥분", cx + rad * 0.55, cy - rad * 0.9); c.fillText("분노·불안", cx - rad * 0.55, cy - rad * 0.9); c.fillText("슬픔·피로", cx - rad * 0.55, cy + rad * 0.95); c.fillText("평온·만족", cx + rad * 0.55, cy + rad * 0.95);
    c.fillStyle = "rgba(0,0,0,0.35)"; c.font = "600 11px 'Pretendard',system-ui"; c.fillText("긍정 →", cx + rad - 28, cy + 18); c.fillText("← 부정", cx - rad + 28, cy + 18);
    c.save(); c.translate(cx - 18, cy - rad + 28); c.rotate(-Math.PI / 2); c.fillText("고각성 ↑", 0, 0); c.restore();
    c.save(); c.translate(cx - 18, cy + rad - 28); c.rotate(-Math.PI / 2); c.fillText("↓ 저각성", 0, 0); c.restore();
    c.globalAlpha = 0.18; for (const em of EMOTIONS_28) { const vs = ((em.val - 1) / 8) * 2 - 1, as = ((em.aro - 1) / 8) * 2 - 1; c.beginPath(); c.arc(cx + vs * rad, cy - as * rad, 2.5, 0, Math.PI * 2); c.fillStyle = QC[em.q]; c.fill(); } c.globalAlpha = 1;
    entries.forEach((en, ei) => {
      const isH = hovIdx === ei, dim = hovIdx !== null && !isH;
      en.analysis.hits.forEach((h) => {
        const px = cx + h.valStd * rad, py = cy - h.aroStd * rad, col = eCol(h), dR = isH ? 9 : 6;
        if (isH) { const g = c.createRadialGradient(px, py, 0, px, py, dR * 3.5); g.addColorStop(0, col + "44"); g.addColorStop(1, col + "00"); c.fillStyle = g; c.beginPath(); c.arc(px, py, dR * 3.5, 0, Math.PI * 2); c.fill(); }
        c.beginPath(); c.arc(px, py, dR, 0, Math.PI * 2); c.fillStyle = dim ? col + "30" : col + "cc"; c.fill(); c.strokeStyle = dim ? col + "20" : col; c.lineWidth = 1.5; c.stroke();
        if (!dim) { c.fillStyle = "rgba(0,0,0,0.65)"; c.font = (isH ? "600 " : "500 ") + (isH ? "12" : "9") + "px 'Pretendard',system-ui"; c.textAlign = "center"; c.fillText(h.label, px, py - dR - 5); }
      });
      if (en.analysis.hits.length > 0) { const ax = cx + en.analysis.valStd * rad, ay = cy - en.analysis.aroStd * rad; c.beginPath(); c.arc(ax, ay, isH ? 5 : 3.5, 0, Math.PI * 2); c.fillStyle = dim ? "rgba(100,100,120,0.15)" : "#334155"; c.fill(); }
    });
    if (entries.length > 1) { const ps = entries.filter(e => e.analysis.hits.length > 0).map(e => [cx + e.analysis.valStd * rad, cy - e.analysis.aroStd * rad]); if (ps.length > 1) { c.beginPath(); c.moveTo(ps[0][0], ps[0][1]); for (let i = 1; i < ps.length; i++) c.lineTo(ps[i][0], ps[i][1]); c.strokeStyle = "rgba(51,65,85,0.18)"; c.lineWidth = 1.5; c.setLineDash([4, 4]); c.stroke(); c.setLineDash([]); } }
  }, [entries, sz, hovIdx, cx, cy, rad]);

  const hM = (e) => { const rc = cRef.current.getBoundingClientRect(); const mx = (e.clientX - rc.left) * (sz / rc.width), my = (e.clientY - rc.top) * (sz / rc.height); let f = null; for (const p of pts) { if (Math.hypot(mx - p.px, my - p.py) < 16) { f = p; break; } } setTip(f ? { x: e.clientX - rc.left, y: e.clientY - rc.top, ...f } : null); onHover(f ? f.ei : null); };
  return (
    <div ref={conRef} style={{ position: "relative", width: "100%" }}>
      <canvas ref={cRef} style={{ width: sz, height: sz, maxWidth: "100%", cursor: tip ? "pointer" : "crosshair", borderRadius: 16 }} onMouseMove={hM} onMouseLeave={() => { setTip(null); onHover(null); }} />

        </div>
      )}

  );
}

/* ═══════════ Trend Chart ═══════════ */
function TrendChart({ entries }) {
  const cRef = useRef(null); const W = 540, H = 150;
  useEffect(() => {
    const cv = cRef.current; if (!cv || entries.length < 2) return;
    const dpr = window.devicePixelRatio || 1; cv.width = W * dpr; cv.height = H * dpr; const c = cv.getContext("2d"); c.scale(dpr, dpr); c.clearRect(0, 0, W, H); c.fillStyle = "#fafbfc"; c.fillRect(0, 0, W, H);
    const pad = { l: 40, r: 16, t: 16, b: 30 }, w = W - pad.l - pad.r, h = H - pad.t - pad.b, n = entries.length;
    const xO = (i) => pad.l + (i / (n - 1)) * w, yO = (v) => pad.t + h - (v / 100) * h;
    for (let y = 0; y <= 100; y += 25) { const py = yO(y); c.strokeStyle = "rgba(0,0,0,0.06)"; c.lineWidth = 0.8; c.beginPath(); c.moveTo(pad.l, py); c.lineTo(pad.l + w, py); c.stroke(); c.fillStyle = "rgba(0,0,0,0.3)"; c.font = "9px 'Pretendard',system-ui"; c.textAlign = "right"; c.fillText(y + "%", pad.l - 6, py + 3); }
    const dF = (v, fl) => { c.beginPath(); c.moveTo(xO(0), yO(v[0])); v.forEach((val, i) => c.lineTo(xO(i), yO(val))); c.lineTo(xO(n - 1), yO(0)); c.lineTo(xO(0), yO(0)); c.closePath(); c.fillStyle = fl; c.fill(); };
    const dL = (v, col) => { c.beginPath(); v.forEach((val, i) => { i === 0 ? c.moveTo(xO(i), yO(val)) : c.lineTo(xO(i), yO(val)); }); c.strokeStyle = col; c.lineWidth = 2.2; c.stroke(); v.forEach((val, i) => { c.beginPath(); c.arc(xO(i), yO(val), 3.5, 0, Math.PI * 2); c.fillStyle = col; c.fill(); c.strokeStyle = "#fff"; c.lineWidth = 1.5; c.stroke(); }); };
    const pos = entries.map(e => e.analysis.posPct), neg = entries.map(e => e.analysis.negPct);
    dF(pos, "rgba(91,181,166,0.1)"); dF(neg, "rgba(224,112,112,0.08)"); dL(pos, "#5bb5a6"); dL(neg, "#e07070");
    c.fillStyle = "rgba(0,0,0,0.4)"; c.font = "9px 'Pretendard',system-ui"; c.textAlign = "center"; entries.forEach((e, i) => c.fillText(e.date, xO(i), H - 8));
  }, [entries]);
  if (entries.length < 2) return null;
  return (
    <div>
      <div style={{ fontSize: 11, color: "#64748b", marginBottom: 6, display: "flex", gap: 16 }}>
        <span><span style={{ color: "#5bb5a6" }}>●</span> 긍정</span>
        <span><span style={{ color: "#e07070" }}>●</span> 부정</span>
      </div>
      <canvas ref={cRef} style={{ width: W, height: H, maxWidth: "100%", borderRadius: 12 }} />
    </div>
  );
}

function detectSituations(text) {
  const norm = normalizeKorean(text);
  const tokens = norm.split(" ").filter(Boolean);
  const found = [];
  for (const sit of SITUATION_MAP) {
    for (const tok of tokens) {
      const st = stemKorean(tok);
      if (sit.kw.some(kw => tok.includes(kw) || st.includes(stemKorean(kw)))) {
        found.push(sit);
        break;
      }
    }
  }
  return found;
}

function getSuggestions(situations) {
  // Collect unique emotion names from all matched situations, ranked by frequency
  const freq = {};
  for (const sit of situations) {
    for (const eName of sit.suggest) {
      freq[eName] = (freq[eName] || 0) + 1;
    }
  }
  // Sort by frequency, take top 6
  const sorted = Object.entries(freq).sort((a, b) => b[1] - a[1]).slice(0, 6);
  // Map to full emotion objects
  return sorted.map(([name]) => EMOTIONS_28.find(e => e.name === name)).filter(Boolean);
}

    faceX: 0.5, faceY: 0.5, faceW: 0.15,

  const [stats, setStats] = useState({ correct: 0, total: 0 });

  // Start camera
  const startCam = useCallback(async () => {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user", width: 480, height: 360 } });
      if (vidRef.current) { vidRef.current.srcObject = stream; vidRef.current.play(); setCamReady(true); }
    } catch (e) { setCamError(true); }
  }, []);

  // Stop camera
  const stopCam = useCallback(() => {
    if (vidRef.current && vidRef.current.srcObject) {
      vidRef.current.srcObject.getTracks().forEach(t => t.stop());
      vidRef.current.srcObject = null;
    }
    setCamReady(false);
    if (animRef.current) cancelAnimationFrame(animRef.current);
  }, []);

  useEffect(() => { return () => stopCam(); }, [stopCam]);

  // Face detection via skin color
  const detectFace = useCallback((ctx, w, h) => {
    const img = ctx.getImageData(0, 0, w, h);
    const d = img.data;
    let sumX = 0, sumY = 0, cnt = 0;
    const step = 4; // sample every 4th pixel for speed
    for (let y = 0; y < h; y += step) {
      for (let x = 0; x < w; x += step) {
        const i = (y * w + x) * 4;
        const r = d[i], g = d[i+1], b = d[i+2];
        // Skin color heuristic (works for various skin tones)
        if (r > 60 && g > 40 && b > 20 && r > g && r > b && (r - g) > 15 && Math.abs(r - g) < 120 && r - b > 15) {
          sumX += x; sumY += y; cnt++;
        }
      }
    }
    if (cnt > 50) {
      // Mirror X because video is flipped
      return { x: 1 - (sumX / cnt / w), y: sumY / cnt / h, detected: true };
    }
    return { x: 0.5, y: 0.5, detected: false };
  }, []);

  // Pick next question
  const nextQuestion = useCallback(() => {
    const g = gameRef.current;
    if (g.usedQs.length >= GAME_QS.length) g.usedQs = [];
    let idx;
    do { idx = Math.floor(Math.random() * GAME_QS.length); } while (g.usedQs.includes(idx));
    g.usedQs.push(idx);
    const q = GAME_QS[idx];

    // Create 4 bubbles (1 correct + 3 wrong) at random x positions
    const allEmotions = [q.ans, ...q.wrongs].sort(() => Math.random() - 0.5);
    const bubbles = allEmotions.map((label, i) => ({
      label, correct: label === q.ans,
      x: 0.15 + (i * 0.23) + (Math.random() * 0.05),
      y: -0.05 - (Math.random() * 0.1),
      speed: 0.003 + Math.random() * 0.002,
      eaten: false, size: 0.09,
    }));
    g.bubbles = bubbles;
    g.timer = 0;
    g.qIdx = idx;
    setQuestion(q);
    setFeedback(null);
  }, []);

  // Start game
  const startGame = useCallback(() => {
    const g = gameRef.current;
    g.score = 0; g.combo = 0; g.lives = 3; g.correct = 0; g.total = 0;
    g.usedQs = []; g.state = "playing"; g.feedback = null;
    setScore(0); setLives(3); setCombo(0); setGameState("playing");
    setStats({ correct: 0, total: 0 }); setFeedback(null);
    nextQuestion();
    startCam();
  }, [nextQuestion, startCam]);

  // Game loop
  useEffect(() => {
    if (gameState !== "playing" || !camReady) return;
    const cv = canRef.current;
    const vid = vidRef.current;
    if (!cv || !vid) return;
    const ctx = cv.getContext("2d");

    const loop = () => {
      const W = cv.width, H = cv.height;
      const g = gameRef.current;
      ctx.clearRect(0, 0, W, H);

      // Background (sky gradient instead of video)
      var bgGrad = ctx.createLinearGradient(0, 0, 0, H);
      bgGrad.addColorStop(0, "#c7d2fe"); bgGrad.addColorStop(0.5, "#e0e7ff"); bgGrad.addColorStop(1, "#ddd6fe");
      ctx.fillStyle = bgGrad; ctx.fillRect(0, 0, W, H);
      // Ground
      ctx.fillStyle = "#b8e6d8"; ctx.fillRect(0, H - 50, W, 50);
      ctx.fillStyle = "#6ee7b7";
      for (var gi = 0; gi < W; gi += 40) { ctx.beginPath(); ctx.arc(gi + 20, H - 50, 18, Math.PI, 0); ctx.fill(); }
      // Clouds
      ctx.fillStyle = "rgba(255,255,255,0.6)";
      var drawCloud = function(cx2, cy2, s) { ctx.beginPath(); ctx.arc(cx2, cy2, 15*s, 0, Math.PI*2); ctx.arc(cx2+14*s, cy2-4*s, 12*s, 0, Math.PI*2); ctx.arc(cx2-14*s, cy2-2*s, 10*s, 0, Math.PI*2); ctx.arc(cx2+7*s, cy2-10*s, 11*s, 0, Math.PI*2); ctx.fill(); };
      drawCloud(80, 80, 1.2); drawCloud(300, 60, 1); drawCloud(420, 90, 0.8);

      // Detect face from video (hidden)
      var tmpC = document.createElement("canvas");
      tmpC.width = 120; tmpC.height = 90;
      var tmpCtx = tmpC.getContext("2d");
      tmpCtx.drawImage(vid, 0, 0, 120, 90);
      var face = detectFace(tmpCtx, 120, 90);
      if (face.detected) { g.faceX += (face.x - g.faceX) * 0.3; g.faceY += (face.y - g.faceY) * 0.3; }

      var fx = g.faceX * W, fy = g.faceY * H;
      var mouthY = fy + 25;

      // Situation text box
      ctx.fillStyle = "rgba(99,102,241,0.85)";
      var boxW = 340, boxH = 40, boxX = (W - boxW) / 2, boxY = 10;
      ctx.beginPath(); ctx.roundRect(boxX, boxY, boxW, boxH, 12); ctx.fill();
      ctx.fillStyle = "#fff";
      ctx.font = "bold 15px 'Pretendard',system-ui";
      ctx.textAlign = "center";
      if (question) ctx.fillText(question.sit, W / 2, 36);

      // ── Draw cute character ──
      var charSize = 50;
      // Body (round)
      ctx.fillStyle = "#fde68a";
      ctx.beginPath(); ctx.arc(fx, fy + 10, charSize, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = "#f59e0b"; ctx.lineWidth = 2.5; ctx.stroke();
      // Face circle
      ctx.fillStyle = "#fff8e1";
      ctx.beginPath(); ctx.arc(fx, fy - 5, charSize * 0.75, 0, Math.PI * 2); ctx.fill();
      // Eyes
      var eyeY = fy - 12;
      // Left eye
      ctx.fillStyle = "#1e293b";
      ctx.beginPath(); ctx.ellipse(fx - 16, eyeY, 5, 6, 0, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = "#fff";
      ctx.beginPath(); ctx.arc(fx - 14, eyeY - 2, 2, 0, Math.PI * 2); ctx.fill();
      // Right eye
      ctx.fillStyle = "#1e293b";
      ctx.beginPath(); ctx.ellipse(fx + 16, eyeY, 5, 6, 0, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = "#fff";
      ctx.beginPath(); ctx.arc(fx + 18, eyeY - 2, 2, 0, Math.PI * 2); ctx.fill();
      // Blush
      ctx.fillStyle = "rgba(251,146,146,0.4)";
      ctx.beginPath(); ctx.ellipse(fx - 26, fy - 2, 8, 5, 0, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(fx + 26, fy - 2, 8, 5, 0, 0, Math.PI * 2); ctx.fill();
      // Mouth (open - eating!)
      ctx.fillStyle = "#ef4444";
      ctx.beginPath(); ctx.arc(fx, fy + 8, 10, 0, Math.PI); ctx.fill();
      ctx.fillStyle = "#fca5a5";
      ctx.beginPath(); ctx.arc(fx, fy + 8, 10, 0, Math.PI, true);
      ctx.closePath(); ctx.fill();
      // Ears
      ctx.fillStyle = "#fde68a"; ctx.strokeStyle = "#f59e0b"; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(fx - charSize + 5, fy - 20, 12, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
      ctx.beginPath(); ctx.arc(fx + charSize - 5, fy - 20, 12, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
      // Inner ear
      ctx.fillStyle = "#fca5a5";
      ctx.beginPath(); ctx.arc(fx - charSize + 5, fy - 20, 6, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(fx + charSize - 5, fy - 20, 6, 0, Math.PI * 2); ctx.fill();
      // Little crown/antenna
      ctx.fillStyle = "#a78bfa";
      ctx.beginPath(); ctx.moveTo(fx - 8, fy - 40); ctx.lineTo(fx, fy - 55); ctx.lineTo(fx + 8, fy - 40); ctx.fill();
      ctx.fillStyle = "#c4b5fd";
      ctx.beginPath(); ctx.arc(fx, fy - 56, 4, 0, Math.PI * 2); ctx.fill();

      // Update & draw bubbles
      g.timer += 1 / 60;
      let anyActive = false;
      for (const b of g.bubbles) {
        if (b.eaten) continue;
        b.y += b.speed;
        const bx = b.x * W, by = b.y * H;
        const bSize = b.size * W;

        // Check collision with mouth
        const dist = Math.sqrt(Math.pow(bx - fx, 2) + Math.pow(by - mouthY, 2));
        if (dist < bSize / 2 + 20) {
          b.eaten = true;
          g.total++;
          if (b.correct) {
            g.score += 10 + g.combo * 2;
            g.combo++;
            g.correct++;
            g.feedback = { text: "정답! +" + (10 + (g.combo - 1) * 2), correct: true };
            setScore(g.score); setCombo(g.combo);
            setFeedback({ text: "정답! +" + (10 + (g.combo - 1) * 2), correct: true });
            setStats({ correct: g.correct, total: g.total });
            // Next question after brief delay
            setTimeout(() => { if (g.state === "playing") nextQuestion(); }, 800);
          } else {
            g.combo = 0;
            g.lives--;
            g.feedback = { text: "오답! 정답: " + question.ans, correct: false };
            setCombo(0); setLives(g.lives);
            setFeedback({ text: "오답! 정답: " + question.ans, correct: false });
            setStats({ correct: g.correct, total: g.total });
            if (g.lives <= 0) {
              g.state = "over";
              setGameState("over");
              stopCam();
              return;
            }
            setTimeout(() => { if (g.state === "playing") nextQuestion(); }, 1200);
          }
          continue;
        }

        // Draw bubble as cute candy
        if (b.y < 1.1) {
          anyActive = true;
          var bR = bSize / 2;
          // Candy colors per position
          var candyColors = ["#f472b6","#a78bfa","#60a5fa","#34d399"];
          var cIdx = Math.abs(Math.round(b.x * 10)) % 4;
          var cc = candyColors[cIdx];
          // Shadow
          ctx.fillStyle = "rgba(0,0,0,0.08)";
          ctx.beginPath(); ctx.ellipse(bx, by + bR + 4, bR * 0.8, 4, 0, 0, Math.PI * 2); ctx.fill();
          // Candy body
          ctx.fillStyle = cc;
          ctx.beginPath(); ctx.arc(bx, by, bR, 0, Math.PI * 2); ctx.fill();
          ctx.strokeStyle = "#fff"; ctx.lineWidth = 3; ctx.stroke();
          // Shine
          ctx.fillStyle = "rgba(255,255,255,0.4)";
          ctx.beginPath(); ctx.arc(bx - bR * 0.25, by - bR * 0.25, bR * 0.3, 0, Math.PI * 2); ctx.fill();
          // Label
          ctx.fillStyle = "#fff";
          ctx.font = "bold 14px 'Pretendard',system-ui";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText(b.label, bx, by);
        }
      }

      // If all bubbles fell off screen or eaten, next question
      const allGone = g.bubbles.every(b => b.eaten || b.y > 1.15);
      if (allGone && g.state === "playing") {
        const anyCorrectEaten = g.bubbles.some(b => b.correct && b.eaten);
        if (!anyCorrectEaten) {
          // Missed the correct answer
          g.combo = 0;
          g.lives--;
          g.feedback = { text: "놓쳤어요! 정답: " + question.ans, correct: false };
          setCombo(0); setLives(g.lives);
          setFeedback({ text: "놓쳤어요! 정답: " + question.ans, correct: false });
          g.total++;
          setStats({ correct: g.correct, total: g.total });
          if (g.lives <= 0) {
            g.state = "over";
            setGameState("over");
            stopCam();
            return;
          }
        }
        setTimeout(() => { if (g.state === "playing") nextQuestion(); }, 1000);
      }

      // Draw feedback text with cute style
      if (g.feedback) {
        // Feedback bubble
        var fbW = 260, fbH = 50;
        ctx.fillStyle = g.feedback.correct ? "rgba(91,181,166,0.92)" : "rgba(224,112,112,0.92)";
        ctx.beginPath(); ctx.roundRect(W/2 - fbW/2, H/2 - fbH/2, fbW, fbH, 16); ctx.fill();
        ctx.strokeStyle = "#fff"; ctx.lineWidth = 2; ctx.beginPath(); ctx.roundRect(W/2 - fbW/2, H/2 - fbH/2, fbW, fbH, 16); ctx.stroke();
        ctx.font = "bold 22px 'Pretendard',system-ui";
        ctx.textAlign = "center"; ctx.textBaseline = "middle";
        ctx.fillStyle = "#fff";
        ctx.fillText((g.feedback.correct ? "O " : "X ") + g.feedback.text, W / 2, H / 2);
      }

      // HUD: cute bottom bar
      ctx.fillStyle = "rgba(255,255,255,0.85)";
      ctx.beginPath(); ctx.roundRect(10, H - 44, W - 20, 38, 12); ctx.fill();
      ctx.strokeStyle = "#e2e8f0"; ctx.lineWidth = 1; ctx.beginPath(); ctx.roundRect(10, H - 44, W - 20, 38, 12); ctx.stroke();
      // Score
      ctx.font = "bold 14px 'Pretendard',system-ui";
      ctx.textAlign = "left"; ctx.textBaseline = "middle";
      ctx.fillStyle = "#6366f1";
      ctx.fillText(" " + g.score + "점", 24, H - 25);
      // Hearts
      ctx.fillStyle = "#f87171";
      ctx.font = "16px 'Pretendard',system-ui";
      ctx.textAlign = "center";
      var heartsStr = "";
      for (var hi = 0; hi < 3; hi++) heartsStr += hi < g.lives ? String.fromCodePoint(10084) + " " : String.fromCodePoint(9825) + " ";
      ctx.fillText(heartsStr, W / 2, H - 25);
      // Combo
      if (g.combo > 1) {
        ctx.fillStyle = "#f59e0b";
        ctx.font = "bold 14px 'Pretendard',system-ui";
        ctx.textAlign = "right";
        ctx.fillText(g.combo + " COMBO!", W - 24, H - 25);
      }

      animRef.current = requestAnimationFrame(loop);
    };
    animRef.current = requestAnimationFrame(loop);
    return () => { if (animRef.current) cancelAnimationFrame(animRef.current); };
  }, [gameState, camReady, detectFace, nextQuestion, question, stopCam]);

  // Idle screen
  if (gameState === "idle") return (
    <div style={{ textAlign: "center", padding: "32px 0" }}>
      <div style={{ fontSize: 56, marginBottom: 16 }}>🎮</div>
      <h3 style={{ fontSize: 20, fontWeight: 700, color: "#1e293b", margin: "0 0 8px" }}>마음 바다 탐험 게임</h3>
      <p style={{ fontSize: 13, color: "#64748b", lineHeight: 1.6, margin: "0 0 24px" }}>
        얼굴을 움직이면 탐험대 캐릭터가 따라와요!<br />
        상황을 읽고, 알맞은 감정을 수집해보세요!<br />
        틀린 감정을 수집하면 하트를 잃어요.
      </p>
      <div style={{ display: "flex", gap: 12, justifyContent: "center", flexWrap: "wrap", marginBottom: 20 }}>
        <div style={{ ...crd, padding: "12px 16px", textAlign: "center", flex: "0 1 120px" }}>
          <div style={{ fontSize: 24 }}>🎯</div>
          <div style={{ fontSize: 11, color: "#64748b", marginTop: 4 }}>바다 속<br />감정을 찾아요</div>
        </div>
        <div style={{ ...crd, padding: "12px 16px", textAlign: "center", flex: "0 1 120px" }}>
          <div style={{ fontSize: 24 }}>🐣</div>
          <div style={{ fontSize: 11, color: "#64748b", marginTop: 4 }}>탐험대 캐릭터로<br />항해해요</div>
        </div>
        <div style={{ ...crd, padding: "12px 16px", textAlign: "center", flex: "0 1 120px" }}>
          <div style={{ fontSize: 24 }}>🍬</div>
          <div style={{ fontSize: 11, color: "#64748b", marginTop: 4 }}>감정을<br />수집해요</div>
        </div>
      </div>
      <button onClick={startGame} style={{ ...bPri, padding: "14px 40px", fontSize: 16 }}>탐험 출발!</button>
      {camError && <p style={{ color: "#e07070", fontSize: 12, marginTop: 12 }}>카메라 접근이 거부되었어요. 브라우저 설정에서 카메라를 허용해주세요.</p>}
    </div>
  );

  // Game over screen
  if (gameState === "over") {
    const pct = stats.total > 0 ? Math.round((stats.correct / stats.total) * 100) : 0;
    const grade = pct >= 90 ? "S" : pct >= 70 ? "A" : pct >= 50 ? "B" : "C";
    const gradeColor = { S: "#6366f1", A: "#5bb5a6", B: "#f59e0b", C: "#e07070" }[grade];
    const msg = { S: "전설의 탐험가! 놀라워요!", A: "훌륭한 항해사! 감정을 잘 알고 있네요!", B: "좋아요! 조금 더 탐험해봐요!", C: "괜찮아요! 다시 탐험해봐요!" }[grade];
    return (
      <div style={{ textAlign: "center", padding: "32px 0" }}>
        <div style={{ fontSize: 72, fontWeight: 900, color: gradeColor, marginBottom: 4 }}>{grade}</div>
        <div style={{ fontSize: 36, fontWeight: 800, color: "#1e293b", marginBottom: 8 }}>{score}점</div>
        <p style={{ fontSize: 15, color: "#64748b", margin: "0 0 4px" }}>{msg}</p>
        <p style={{ fontSize: 13, color: "#94a3b8", margin: "0 0 24px" }}>정답률: {stats.correct}/{stats.total} ({pct}%)</p>
        <div style={{ display: "flex", gap: 8, justifyContent: "center" }}>
          <button onClick={startGame} style={{ ...bPri, padding: "12px 32px" }}>다시 탐험</button>
          <button onClick={() => { setGameState("idle"); setFeedback(null); }} style={{ ...bSoft, padding: "12px 20px" }}>기지로 돌아가기</button>
        </div>
      </div>
    );
  }

  // Playing screen
  return (
    <div style={{ position: "relative", width: "100%", maxWidth: 480, margin: "0 auto" }}>
      <video ref={vidRef} style={{ display: "none" }} playsInline muted />
      <canvas ref={canRef} width={480} height={360} style={{ width: "100%", borderRadius: 16, background: "#1e293b" }} />
      <div style={{ display: "flex", justifyContent: "space-between", marginTop: 8 }}>
        <button onClick={() => { stopCam(); gameRef.current.state = "over"; setGameState("over"); }} style={{ ...bSoft, padding: "6px 14px", fontSize: 12 }}>탐험 종료</button>
        <span style={{ fontSize: 12, color: "#94a3b8" }}>캐릭터를 움직여 알맞은 감정을 수집하세요!</span>
      </div>
    </div>
  );
}

/* ═══════════ Donut Chart ═══════════ */
function DonutChart({ data, title, emptyText }) {
  var cRef = useRef(null);
  var sz = 140;
  useEffect(function() {
    var cv = cRef.current; if (!cv || !data || data.length === 0) return;
    var dpr = window.devicePixelRatio || 1;
    cv.width = sz * dpr; cv.height = sz * dpr;
    var c = cv.getContext("2d"); c.scale(dpr, dpr);
    c.clearRect(0, 0, sz, sz);
    var cx = sz / 2, cy = sz / 2, R = 58, r = 36;
    var total = data.reduce(function(s, d) { return s + d.count; }, 0);
    if (total === 0) return;
    var angle = -Math.PI / 2;
    data.forEach(function(d, i) {
      var slice = (d.count / total) * Math.PI * 2;
      c.beginPath();
      c.arc(cx, cy, R, angle, angle + slice);
      c.arc(cx, cy, r, angle + slice, angle, true);
      c.closePath();
      c.globalAlpha = 0.65;
      c.fillStyle = d.color || "#6366f1";
      c.fill();
      c.globalAlpha = 1;
      angle += slice;
    });
  }, [data, sz]);

  if (!data || data.length === 0) return (
    <div style={{ textAlign: "center", padding: 20, color: "#cbd5e1", fontSize: 13 }}>{emptyText || "데이터 없음"}</div>
  );
  return (
    <div>
      <div style={{ fontSize: 13, fontWeight: 700, color: "#1e293b", marginBottom: 10 }}>{title}</div>
      <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 12 }}>
        <canvas ref={cRef} style={{ width: sz, height: sz }} />
        <div style={{ display: "flex", flexWrap: "wrap", gap: "6px 14px", justifyContent: "center", width: "100%" }}>
          {data.slice(0, 10).map(function(d, i) {
            return (
              <div key={d.label} style={{ display: "flex", alignItems: "center", gap: 5, fontSize: 12 }}>
                <div style={{ width: 8, height: 8, borderRadius: 2, background: d.color || "#6366f1", opacity: 0.7, flexShrink: 0 }} />
                <span style={{ color: "#475569", fontWeight: 500, whiteSpace: "nowrap" }}>{d.label}</span>
                <span style={{ color: "#94a3b8", whiteSpace: "nowrap" }}>{d.count}회</span>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

/* ═══════════ Simple Word Cloud ═══════════ */
function SimpleWordCloud({ words, color }) {
  var cRef = useRef(null);
  var W = 280, H = 140;
  useEffect(function() {
    var cv = cRef.current; if (!cv || !words || words.length === 0) return;
    var dpr = window.devicePixelRatio || 1;
    cv.width = W * dpr; cv.height = H * dpr;
    var c = cv.getContext("2d"); c.scale(dpr, dpr);
    c.clearRect(0, 0, W, H);
    c.fillStyle = "#fafbfc"; c.fillRect(0, 0, W, H);
    var maxCount = words[0] ? words[0].count : 1;
    var placed = [];
    words.slice(0, 20).forEach(function(w) {
      var fontSize = Math.max(11, Math.min(28, 10 + (w.count / maxCount) * 20));
      c.font = "600 " + fontSize + "px 'Pretendard',system-ui";
      var tw = c.measureText(w.word).width;
      var attempts = 0;
      var x, y, ok;
      do {
        x = Math.random() * (W - tw - 10) + 5;
        y = Math.random() * (H - fontSize - 10) + fontSize + 5;
        ok = true;
        for (var pi = 0; pi < placed.length; pi++) {
          var p = placed[pi];
          if (x < p.x + p.w + 4 && x + tw + 4 > p.x && y - fontSize < p.y && y > p.y - p.h) {
            ok = false; break;
          }
        }
        attempts++;
      } while (!ok && attempts < 50);
      if (ok || attempts >= 50) {
        var alpha = 0.5 + (w.count / maxCount) * 0.5;
        c.fillStyle = color || "#6366f1";
        c.globalAlpha = alpha;
        c.font = "600 " + fontSize + "px 'Pretendard',system-ui";
        c.textBaseline = "bottom";
        c.fillText(w.word, x, y);
        c.globalAlpha = 1;
        placed.push({ x: x, y: y, w: tw, h: fontSize });
      }
    });
  }, [words, color, W, H]);

  if (!words || words.length === 0) return (
    <div style={{ padding: 16, color: "#cbd5e1", fontSize: 12, textAlign: "center" }}>관련 키워드 없음</div>
  );
  return <canvas ref={cRef} style={{ width: W, height: H, maxWidth: "100%", borderRadius: 10, border: "1px solid #f1f5f9" }} />;
}

/* ═══════════ Situation Extraction (sentence structure) ═══════════ */
// Korean causal/reason connectors: the clause BEFORE these = situation
var CAUSAL_ENDINGS = [
  "아서","어서","여서","해서","라서","이라서",
  "니까","으니까","니깐","으니깐",
  "때문에","때문",
  "덕분에","덕분",
  "다가","하다가",
  "하니","하니까",
  "는데","ㄴ데","은데","인데",
  "다보니","하다보니",
  "느라","하느라",
  "길래","기에","므로","이므로",
  "탓에","탓",
];
// Time/condition markers
var TIME_ENDINGS = ["할때","할 때","했을때","했을 때","하면","으면","되면"];
// Clean up extracted situations
var SIT_STOP = new Set(["그래서","그런데","하지만","그리고","근데","그래도","그러면","그럼","나는","나도","내가","저는","제가","오늘","어제","내일","진짜","정말","너무","매우","아주","완전","엄청","약간","조금"]);

// Helper: check if text contains emotion words
/* ═══════════ Situation Extraction (category-based) ═══════════ */
function extractSituations(textArray) {
  var sitFreq = {};
  textArray.forEach(function(text) {
    var norm = normalizeKorean(text);
    var tokens = norm.split(" ").filter(Boolean);
    var matched = new Set();
    for (var si = 0; si < SITUATION_MAP.length; si++) {
      var sit = SITUATION_MAP[si];
      for (var ti = 0; ti < tokens.length; ti++) {
        var tok = tokens[ti];
        var st = stemKorean(tok);
        for (var ki = 0; ki < sit.kw.length; ki++) {
          if (tok.includes(sit.kw[ki]) || st.includes(stemKorean(sit.kw[ki]))) {
            if (!matched.has(sit.ctx)) {
              matched.add(sit.ctx);
              sitFreq[sit.ctx] = (sitFreq[sit.ctx] || 0) + 1;
            }
            break;
          }
        }
      }
    }
  });
  return Object.entries(sitFreq).sort(function(a, b) { return b[1] - a[1]; }).map(function(e) { return { text: e[0], count: e[1] }; });
}

/* ═══════════ Date Helpers ═══════════ */
function fmtDate(d) { return (d.getMonth() + 1) + "." + d.getDate(); }
function nextDay(dateStr) {
  // Parse "M.D" format and return next day
  const parts = dateStr.split(".");
  if (parts.length < 2) return dateStr;
  const now = new Date();
  const m = parseInt(parts[0]) - 1;
  const d = parseInt(parts[1]);
  const date = new Date(now.getFullYear(), m, d);
  date.setDate(date.getDate() + 1);
  return fmtDate(date);
}
function todayStr() { return fmtDate(new Date()); }

/* ═══════════ DiaryView ═══════════ */
function DiaryView({ entries, setEntries, save, readOnly }) {
  const [date, setDate] = useState(todayStr);
  const [text, setText] = useState("");
  const [tab, setTab] = useState(readOnly ? "change" : "input");
  const [hovIdx, setHovIdx] = useState(null);
  const [lastR, setLastR] = useState(null);

  // Suggestion flow state
  const [pending, setPending] = useState(null); // { text, date, situations, suggestions }
  const [customEmo, setCustomEmo] = useState(""); // custom emotion text input
  const [showCustom, setShowCustom] = useState(false); // toggle custom input
  const [privacy, setPrivacy] = useState(1); // 1 = fully visible, 0.05 = nearly hidden

  // Date range filter for analysis tab
  const [rangeMode, setRangeMode] = useState("all"); // "7", "30", "all", "custom"
  const [rangeStart, setRangeStart] = useState("");
  const [rangeEnd, setRangeEnd] = useState("");

  // Parse "M.D" to comparable number (M*100+D)
  var parseDate = function(ds) {
    var p = String(ds).split(".");
    if (p.length < 2) return 0;
    return parseInt(p[0]) * 100 + parseInt(p[1]);
  };

  // Filter entries by date range
  var filteredEntries = useMemo(function() {
    if (!entries.length) return [];
    if (rangeMode === "all") return entries;
    if (rangeMode === "custom" && rangeStart && rangeEnd) {
      var s = parseDate(rangeStart), e = parseDate(rangeEnd);
      return entries.filter(function(en) { var d = parseDate(en.date); return d >= s && d <= e; });
    }
    if (rangeMode === "7" || rangeMode === "30") {
      var count = parseInt(rangeMode);
      return entries.slice(-count);
    }
    return entries;
  }, [entries, rangeMode, rangeStart, rangeEnd]);

  // Emotion analysis for filtered entries
  var emotionAnalysis = useMemo(function() {
    if (!filteredEntries.length) return { posTop: [], negTop: [], posTexts: {}, negTexts: {} };
    var posFreq = {}, negFreq = {}, posTexts = {}, negTexts = {};
    filteredEntries.forEach(function(en) {
      var a = en.analysis;
      // Russell hits
      (a.hits || []).forEach(function(h) {
        if (h.val9 > 5) {
          posFreq[h.label] = (posFreq[h.label] || 0) + 1;
          if (!posTexts[h.label]) posTexts[h.label] = [];
          posTexts[h.label].push(en.text);
        } else if (h.val9 < 5) {
          negFreq[h.label] = (negFreq[h.label] || 0) + 1;
          if (!negTexts[h.label]) negTexts[h.label] = [];
          negTexts[h.label].push(en.text);
        }
      });
      // Extended positive
      (a.matchedPos || []).forEach(function(m) {
        var lb = "+" + m.word;
        posFreq[lb] = (posFreq[lb] || 0) + 1;
        if (!posTexts[lb]) posTexts[lb] = [];
        posTexts[lb].push(en.text);
      });
      // Extended negative
      (a.matchedNeg || []).forEach(function(m) {
        var lb = "-" + m.word;
        negFreq[lb] = (negFreq[lb] || 0) + 1;
        if (!negTexts[lb]) negTexts[lb] = [];
        negTexts[lb].push(en.text);
      });
    });
    var posColors = ["#5bb5a6","#34d399","#6ee7b7","#b8e6d8","#d1fae5","#059669","#047857","#065f46","#14b8a6","#0d9488"];
    var negColors = ["#e07070","#ef4444","#f87171","#fca5a5","#fecaca","#dc2626","#b91c1c","#991b1b","#e11d48","#be123c"];
    var posTop = Object.entries(posFreq).sort(function(a,b){return b[1]-a[1];}).slice(0,10).map(function(e,i){return{label:e[0],count:e[1],color:posColors[i%posColors.length]};});
    var negTop = Object.entries(negFreq).sort(function(a,b){return b[1]-a[1];}).slice(0,10).map(function(e,i){return{label:e[0],count:e[1],color:negColors[i%negColors.length]};});
    // Merge all texts for positive/negative situations
    var allPosTexts = [];
    Object.keys(posTexts).forEach(function(k) { allPosTexts = allPosTexts.concat(posTexts[k]); });
    var allNegTexts = [];
    Object.keys(negTexts).forEach(function(k) { allNegTexts = allNegTexts.concat(negTexts[k]); });
    var posSituations = extractSituations(allPosTexts);
    var negSituations = extractSituations(allNegTexts);
    return { posTop: posTop, negTop: negTop, posSituations: posSituations, negSituations: negSituations };
  }, [filteredEntries]);

  const advanceDate = useCallback((savedEntries, usedDate) => {
    const today = todayStr();
    if (usedDate === today) { setDate(nextDay(today)); }
    else { setDate(nextDay(usedDate)); }
  }, []);

  // Core save function (always saves)
  const doSave = useCallback((entryText, entryDate) => {
    const analysis = analyzeEntry(entryText);
    const ne = { date: entryDate, text: entryText, analysis, ts: Date.now() + Math.random() };
    const u = [...entries, ne];

  const add = useCallback(() => {

    const rawText = text.trim();
    // Parse optional date prefix
    const parts = rawText.split(/\s+/);

    const analysis = analyzeEntry(entryText);

    } else {

          EMOTIONS_28.find(e => e.name === "tired"),

          EMOTIONS_28.find(e => e.name === "excited"),
          EMOTIONS_28.find(e => e.name === "lonely"),

        setPending({
          text: entryText,
          date: entryDate,
          situations: [],
          suggestions: genericSuggestions,
          contextLabel: null,
        });

    }
  }, [text, date, readOnly, doSave]);

  // Select a suggested emotion and save
  const confirmWithEmotion = useCallback((emo) => {

  }, [pending, customEmo, doSave]);

  const del = useCallback((ts) => { if (readOnly) return; const u = entries.filter(e => e.ts !== ts); setEntries(u); save(u); }, [entries, readOnly, setEntries, save]);

  const stats = useMemo(() => {

    const sorted = Object.entries(freq).sort((a, b) => b[1].count - a[1].count);
    return { sorted, avgPos: entries.reduce((s, e) => s + e.analysis.posPct, 0) / entries.length, avgNeg: entries.reduce((s, e) => s + e.analysis.negPct, 0) / entries.length, total: entries.length };
  }, [entries]);

  const tabS = (a) => ({ padding: "8px 16px", fontSize: 12, fontWeight: a ? 700 : 500, color: a ? "#6366f1" : "#94a3b8", background: a ? "#eef2ff" : "transparent", border: a ? "1px solid #c7d2fe" : "1px solid transparent", borderRadius: 10, cursor: "pointer", whiteSpace: "nowrap" });
  const tabs = readOnly

    : [["input", "🐚 감정 탐험하기"], ["change", "🧭 감정 분석하기"], ["game", "🐙 탐험 연습하기"], ["detail", "🗺️ 항해 기록하기"]];

  const renderInput = () => (
    <div>
      {/* Privacy slider */}

          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={privacy < 0.3 ? "#fff" : privacy < 0.7 ? "#fff" : "#94a3b8"} strokeWidth="2" strokeLinecap="round">

            ) : (

          style={{ flex: 1, height: 4, cursor: "pointer", accentColor: "#6366f1" }} />
        <span style={{ fontSize: 11, fontWeight: 600, color: privacy < 0.3 ? "#6366f1" : privacy < 0.7 ? "#a5b4fc" : "#cbd5e1", width: 52, textAlign: "right", flexShrink: 0, transition: "all 0.3s" }}>{privacy < 0.3 ? "비공개" : privacy < 0.7 ? "흐리게" : "보이기"}</span>

          {lastR.analysis.matchedNeg.length > 0 && <div style={{ marginTop: 4, fontSize: 11, color: "#e07070" }}>보조 부정: {lastR.analysis.matchedNeg.map(m => m.word).join(", ")}</div>}
          <div style={{ marginTop: 6, fontSize: 11, color: "#94a3b8" }}>긍정 {lastR.analysis.posPct.toFixed(0)}% · 부정 {lastR.analysis.negPct.toFixed(0)}%</div>

      {entries.length > 0 && (

                <div style={{ display: "flex", flexWrap: "wrap", gap: 4 }}>

            {rangeBtn("7", "최근 7일")}
            {rangeBtn("30", "최근 30일")}
            {rangeBtn("all", "전체")}
            {rangeBtn("custom", "직접 입력")}
          </div>
          {rangeMode === "custom" && (
            <div style={{ display: "flex", gap: 8, alignItems: "center", marginTop: 10 }}>
              <input value={rangeStart} onChange={function(e) { setRangeStart(e.target.value); }} placeholder="시작 (4.1)" style={{ ...inp, width: 90, fontSize: 13, textAlign: "center" }} />
              <span style={{ color: "#94a3b8" }}>~</span>
              <input value={rangeEnd} onChange={function(e) { setRangeEnd(e.target.value); }} placeholder="종료 (4.14)" style={{ ...inp, width: 90, fontSize: 13, textAlign: "center" }} />
            </div>
          )}
          <div style={{ fontSize: 11, color: "#94a3b8", marginTop: 8 }}>선택된 기간: {fe.length}개의 일기</div>
        </div>

        {/* 1. Trend chart */}
        <div style={lbl}>감정 변화 추이</div>
        {fe.length >= 2 ? (
          <div>
            <TrendChart entries={fe} />
            <div style={{ ...crd, marginTop: 12, display: "flex", gap: 20, flexWrap: "wrap" }}>
              <div><span style={{ color: "#94a3b8", fontSize: 13 }}>평균 긍정</span> <span style={{ color: "#5bb5a6", fontWeight: 700 }}>{(fe.reduce(function(s,e){return s+e.analysis.posPct;},0)/fe.length).toFixed(1)}%</span></div>
              <div><span style={{ color: "#94a3b8", fontSize: 13 }}>평균 부정</span> <span style={{ color: "#e07070", fontWeight: 700 }}>{(fe.reduce(function(s,e){return s+e.analysis.negPct;},0)/fe.length).toFixed(1)}%</span></div>
              <div><span style={{ color: "#94a3b8", fontSize: 13 }}>기록</span> <span style={{ fontWeight: 700 }}>{fe.length}개</span></div>
            </div>
            <div style={{ marginTop: 12 }}>
              {fe.map(function(e) {
                var vn = (e.analysis.valence9 - 1) / 8;
                var bc = vn > 0.55 ? "#5bb5a6" : vn < 0.4 ? "#e07070" : "#f59e0b";
                return (
                  <div key={e.ts} style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 14px", marginBottom: 6, background: "#fff", borderRadius: 10, borderLeft: "3px solid " + bc, border: "1px solid #f1f5f9" }}>
                    <span style={{ fontSize: 12, fontWeight: 700, width: 36 }}>{e.date}</span>
                    <div style={{ flex: 1, display: "flex", flexWrap: "wrap", gap: 3 }}>
                      {e.analysis.hits.map(function(h, j) { return <EmoTag key={j} h={h} />; })}
                      {e.analysis.hits.length === 0 && <span style={{ fontSize: 10, color: "#cbd5e1" }}>-</span>}
                    </div>
                    <span style={{ fontSize: 11, color: "#94a3b8", whiteSpace: "nowrap" }}>{e.analysis.posPct.toFixed(0)}+ {e.analysis.negPct.toFixed(0)}-</span>
                  </div>
                );
              })}
            </div>
          </div>
        ) : (
          <div style={{ padding: "16px 0", color: "#94a3b8", fontSize: 13 }}>추이 그래프는 2개 이상의 일기가 필요합니다.</div>
        )}

        <div style={{ height: 1, background: "#e5e7eb", margin: "24px 0" }} />

        {/* 2. Circumplex */}
        <div style={lbl}>감정 원형 그래프</div>
        <p style={{ fontSize: 11, color: "#94a3b8", margin: "0 0 14px" }}>컬러 점 = 감지 감정 / 어두운 점 = 일자 평균 / 점선 = 궤적</p>
        <CircumplexChart entries={fe} hovIdx={hovIdx} onHover={setHovIdx} />
        <div style={{ display: "flex", flexWrap: "wrap", gap: 5, marginTop: 14 }}>
          {fe.map(function(e, i) {
            return (
              <button key={e.ts} onMouseEnter={function() { setHovIdx(i); }} onMouseLeave={function() { setHovIdx(null); }} style={{ padding: "4px 10px", fontSize: 11, fontWeight: 600, background: hovIdx === i ? "#eef2ff" : "#f8fafc", color: hovIdx === i ? "#6366f1" : "#94a3b8", border: "1px solid " + (hovIdx === i ? "#c7d2fe" : "#e2e8f0"), borderRadius: 6, cursor: "pointer" }}>{e.date}</button>
            );
          })}
        </div>

        <div style={{ height: 1, background: "#e5e7eb", margin: "24px 0" }} />

        {/* 3. TOP 10 donut */}
        <div style={lbl}>감정 TOP 10</div>
        <div style={{ display: "flex", gap: 16, flexWrap: "wrap" }}>
          <div style={{ ...crd, flex: "1 1 260px", minWidth: 240 }}>
            <DonutChart data={ea.posTop} title="😊 긍정 감정 TOP 10" emptyText="긍정 감정 없음" />
          </div>
          <div style={{ ...crd, flex: "1 1 260px", minWidth: 240 }}>
            <DonutChart data={ea.negTop} title="😢 부정 감정 TOP 10" emptyText="부정 감정 없음" />
          </div>
        </div>

        <div style={{ height: 1, background: "#e5e7eb", margin: "24px 0" }} />

        {/* 4. Situations */}
        <div style={lbl}>감정별 상황</div>
        <p style={{ fontSize: 11, color: "#94a3b8", margin: "0 0 14px" }}>일기에서 추출한 상황 표현 (학생이 직접 쓴 문장 그대로)</p>

        <div style={{ display: "flex", gap: 16, flexWrap: "wrap" }}>
          <div style={{ ...crd, flex: "1 1 260px", minWidth: 240 }}>
            <div style={{ fontSize: 13, fontWeight: 700, color: "#5bb5a6", marginBottom: 10 }}>😊 긍정 상황</div>
            {ea.posSituations && ea.posSituations.length > 0 ? (
              <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                {ea.posSituations.slice(0, 12).map(function(s, i) {
                  var sz = 13;
                  return (
                    <span key={i} style={{ padding: "6px 12px", borderRadius: 20, background: "#eef7f4", color: "#5bb5a6", fontSize: sz, fontWeight: 600, border: "1px solid #b8e6d8" }}>
                      {s.text} <span style={{ fontSize: 10, opacity: 0.6 }}>{s.count}</span>
                    </span>
                  );
                })}
              </div>
            ) : (
              <div style={{ color: "#cbd5e1", fontSize: 12 }}>추출된 상황 없음</div>
            )}
          </div>
          <div style={{ ...crd, flex: "1 1 260px", minWidth: 240 }}>
            <div style={{ fontSize: 13, fontWeight: 700, color: "#e07070", marginBottom: 10 }}>😢 부정 상황</div>
            {ea.negSituations && ea.negSituations.length > 0 ? (
              <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                {ea.negSituations.slice(0, 12).map(function(s, i) {
                  var sz = 13;
                  return (
                    <span key={i} style={{ padding: "6px 12px", borderRadius: 20, background: "#fef2f2", color: "#e07070", fontSize: sz, fontWeight: 600, border: "1px solid #fecaca" }}>
                      {s.text} <span style={{ fontSize: 10, opacity: 0.6 }}>{s.count}</span>
                    </span>
                  );
                })}
              </div>
            ) : (
              <div style={{ color: "#cbd5e1", fontSize: 12 }}>추출된 상황 없음</div>
            )}
          </div>
        </div>
      </div>
    );
  };

  const renderDetail = () => {
    if (entries.length === 0) return <EmptyState icon="🔍" text="항해 기록이 비어있습니다" action={readOnly ? null : () => setTab("input")} />;
    return (
      <div>
        <div style={lbl}>🗺️ 항해 기록</div>
        {entries.map((e) => (
          <div key={e.ts} style={{ ...crd, marginBottom: 8 }}>
            <div style={{ fontWeight: 700, fontSize: 13, marginBottom: 6 }}>📅 {e.date}</div>
            <div style={{ fontSize: 12, color: "#64748b", marginBottom: 8, lineHeight: 1.5 }}>{e.text}</div>
            <div style={{ fontSize: 11, lineHeight: 1.8, color: "#64748b" }}>
              <div><b>Russell:</b> {e.analysis.hits.length > 0 ? e.analysis.hits.map(h => h.label + "(" + h.token + ")").join(", ") : "(없음)"}</div>
              <div><b style={{ color: "#5bb5a6" }}>보조 긍정:</b> {e.analysis.matchedPos.length > 0 ? e.analysis.matchedPos.map(m => m.word + "(" + m.weight + "x)").join(", ") : "(없음)"}</div>
              <div><b style={{ color: "#e07070" }}>보조 부정:</b> {e.analysis.matchedNeg.length > 0 ? e.analysis.matchedNeg.map(m => m.word + "(" + m.weight + "x)").join(", ") : "(없음)"}</div>
              <div style={{ marginTop: 4, fontSize: 10, color: "#94a3b8" }}>V:{e.analysis.valence9.toFixed(2)} · A:{e.analysis.arousal9.toFixed(2)} · 긍정:{e.analysis.posPct.toFixed(1)}% · 부정:{e.analysis.negPct.toFixed(1)}%</div>
            </div>
          </div>
        ))}
      </div>
    );
  };

  return (
    <div>
      <div style={{ display: "flex", gap: 6, marginBottom: 16, overflowX: "auto", paddingBottom: 4 }}>
        {tabs.map(([k, l]) => (
          <button key={k} style={tabS(tab === k)} onClick={() => setTab(k)}>{l}</button>
        ))}
      </div>
      {tab === "input" && !readOnly && renderInput()}
      {tab === "change" && renderChange()}
      {tab === "game" && !readOnly && <EmotionGame />}
      {tab === "detail" && renderDetail()}
    </div>
  );
}

/* ═══════════ Main App ═══════════ */
function App() {
  const [page, setPage] = useState("home");
  const [loading, setLoading] = useState(true);
  const [msg, setMsg] = useState("");
  const [schools, setSchools] = useState([]);
  const [currentUser, setCU] = useState(null);
  const [loginForm, setLF] = useState({ schoolCode: "", name: "", role: "student" });
  const [schoolForm, setSF] = useState({ schoolName: "", teacherName: "" });
  const [studentForm, setStF] = useState({ studentName: "", grade: "", classNumber: "" });
  const [myStudents, setMS] = useState([]);
  const [viewStu, setVS] = useState(null);
  const [viewEntries, setVE] = useState([]);
  const [myEntries, setME] = useState([]);

  useEffect(() => {
    (async () => { const sc = await sGet(SK.schools); if (sc) setSchools(sc); setLoading(false); })();
  }, []);

  const genCode = () => "SCH" + Math.random().toString(36).substring(2, 8).toUpperCase();

  const createSchool = async () => {
    if (!schoolForm.schoolName.trim() || !schoolForm.teacherName.trim()) { setMsg("학교명과 교사명을 입력해주세요."); return; }
    const code = genCode();
    const ns = { id: Date.now(), schoolName: schoolForm.schoolName.trim(), teacherName: schoolForm.teacherName.trim(), schoolCode: code };
    const updated = [...schools, ns]; setSchools(updated); await sSet(SK.schools, updated);
    await sSet(stuKey(code), []);
    setCU(ns); setMS([]); setPage("teacherDash"); setSF({ schoolName: "", teacherName: "" });
    setMsg("✅ 학교가 생성되었습니다! 탐험대 코드: " + code);
  };

  const teacherLogin = async () => {
    const s = schools.find(s => s.schoolCode === loginForm.schoolCode.trim().toUpperCase() && s.teacherName === loginForm.name.trim());
    if (s) { setCU(s); const st = await sGet(stuKey(s.schoolCode)) || []; setMS(st); setPage("teacherDash"); setLF({ schoolCode: "", name: "", role: "student" }); setMsg(""); }
    else setMsg("탐험대 코드 또는 교사명이 일치하지 않습니다.");
  };

  const studentLogin = async () => {
    const code = loginForm.schoolCode.trim().toUpperCase();
    const school = schools.find(s => s.schoolCode === code);
    if (!school) { setMsg("탐험대 코드가 존재하지 않습니다."); return; }
    const stuList = await sGet(stuKey(code)) || [];
    const found = stuList.find(s => s.name === loginForm.name.trim());
    if (!found) { setMsg("등록되지 않은 학생입니다. 교사에게 등록을 요청하세요."); return; }
    setCU({ ...found, schoolCode: code, schoolName: school.schoolName });
    const entries = safeEntries(await sGet(dKey(found.id))); setME(entries);
    setPage("studentDiary"); setLF({ schoolCode: "", name: "", role: "student" }); setMsg("");
  };

  const handleLogin = () => {
    if (!loginForm.schoolCode.trim() || !loginForm.name.trim()) { setMsg("탐험대 코드와 이름을 입력해주세요."); return; }
    loginForm.role === "teacher" ? teacherLogin() : studentLogin();
  };

  const addStudent = async () => {
    if (!studentForm.studentName.trim()) { setMsg("대원 이름을 입력해주세요."); return; }
    const code = currentUser.schoolCode;
    const list = await sGet(stuKey(code)) || [];
    if (list.some(s => s.name === studentForm.studentName.trim())) { setMsg("이미 등록된 대원 이름입니다."); return; }
    const ns = { id: Date.now(), name: studentForm.studentName.trim(), grade: studentForm.grade.trim(), classNumber: studentForm.classNumber.trim() };
    const updated = [...list, ns]; await sSet(stuKey(code), updated); setMS(updated);
    await sSet(dKey(ns.id), []);
    setStF({ studentName: "", grade: "", classNumber: "" }); setMsg("✅ " + ns.name + " 대원이 추가되었습니다.");
  };

  const [bulkCount, setBulkCount] = useState("");
  const [bulkGrade, setBulkGrade] = useState("");
  const [bulkClass, setBulkClass] = useState("");

  const bulkAddStudents = async () => {
    var count = parseInt(bulkCount);
    if (!count || count < 1 || count > 50) { setMsg("1~50 사이 숫자를 입력해주세요."); return; }
    const code = currentUser.schoolCode;
    const list = await sGet(stuKey(code)) || [];
    var added = 0;
    var updated = [...list];
    for (var i = 1; i <= count; i++) {
      var name = i + "번";
      if (!updated.some(function(s) { return s.name === name; })) {
        var ns = { id: Date.now() + i, name: name, grade: bulkGrade.trim(), classNumber: bulkClass.trim() };
        updated.push(ns);
        await sSet(dKey(ns.id), []);
        added++;
      }
    }
    await sSet(stuKey(code), updated);
    setMS(updated);
    setBulkCount(""); setBulkGrade(""); setBulkClass("");
    setMsg("✅ " + added + "명의 대원이 일괄 등록되었습니다. (1번~" + count + "번)");
  };

  const delStudent = async (stu) => {
    if (!confirm(stu.name + " 대원을 삭제할까요?")) return;
    try {
      const code = currentUser.schoolCode;
      // Fetch latest list from DB to avoid stale state
      const list = await sGet(stuKey(code)) || [];
      const updated = list.filter(function(s) { return s.id !== stu.id && s.name !== stu.name; });
      await sSet(stuKey(code), updated);
      setMS(updated);
      // Remove diary data
      await sSet(dKey(stu.id), null);
      if (viewStu && viewStu.id === stu.id) { setVS(null); setVE([]); }
      setMsg(stu.name + " 대원이 삭제되었습니다.");
    } catch (e) {
      console.error("Delete error:", e);
      setMsg("삭제 중 오류가 발생했습니다.");
    }
  };

  const viewStudentRecords = async (stu) => { setVS(stu); const e = safeEntries(await sGet(dKey(stu.id))); setVE(e); };
  const clearStuRecords = async (stu) => { if (!confirm(stu.name + "의 기록을 모두 비울까요?")) return; await sSet(dKey(stu.id), []); if (viewStu && viewStu.id === stu.id) setVE([]); setMsg("기록이 비워졌습니다."); };
  const saveMyEntries = useCallback(async (e) => { if (!currentUser) return; await sSet(dKey(currentUser.id), e); }, [currentUser]);
  const logout = () => { setCU(null); setPage("home"); setMsg(""); setVS(null); setVE([]); setME([]); };

  const msgBox = msg ? <div style={{ margin: "12px 0", padding: "12px 16px", borderRadius: 12, background: msg.startsWith("✅") ? "#ecfdf5" : "#fef2f2", color: msg.startsWith("✅") ? "#065f46" : "#991b1b", fontSize: 13, fontWeight: 500, border: "1px solid " + (msg.startsWith("✅") ? "#b8e6d8" : "#fecaca") }}>{msg}</div> : null;

  if (loading) return <div style={{ ...shell, display: "flex", alignItems: "center", justifyContent: "center", height: "100vh" }}><span style={{ color: "#94a3b8" }}>불러오는 중...</span></div>;

  /* ─── HOME ─── */
  if (page === "home") return (
    <div style={shell}>
      
      <div style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", minHeight: "100vh", padding: 24 }}>
        <h1 style={{ fontSize: 36, fontWeight: 800, margin: 0, background: "linear-gradient(135deg,#6366f1,#8b5cf6)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>마음 바다 탐험대</h1>
        <p style={{ fontSize: 14, color: "#64748b", margin: "8px 0 40px", textAlign: "center", lineHeight: 1.6 }}>나의 마음 바다 속에는 어떤 감정들이 헤엄치고 있을까요?<br />감정일기를 통한 마음 탐험 일지</p>
        <div style={{ display: "flex", gap: 20, maxWidth: 720, width: "100%", flexWrap: "wrap" }}>
          {/* Login */}
          <div style={{ ...crd, padding: 24, flex: "1 1 320px" }}>
            <h2 style={{ fontSize: 20, fontWeight: 700, margin: "0 0 4px" }}>🧭 탐험 시작</h2>
            <p style={{ fontSize: 12, color: "#94a3b8", margin: "0 0 16px" }}>탐험대 코드와 이름으로 출발!</p>
            {msgBox}
            <div style={{ display: "flex", gap: 6, marginBottom: 12 }}>
              {["student", "teacher"].map(r => (
                <button key={r} onClick={() => setLF({ ...loginForm, role: r })} style={{ flex: 1, padding: 10, fontSize: 13, fontWeight: 600, borderRadius: 10, border: "none", cursor: "pointer", background: loginForm.role === r ? "#6366f1" : "#f1f5f9", color: loginForm.role === r ? "#fff" : "#64748b" }}>
                  {r === "student" ? "🐠 대원" : "🚢 선장"}
                </button>
              ))}
            </div>
            <input value={loginForm.schoolCode} onChange={e => setLF({ ...loginForm, schoolCode: e.target.value.toUpperCase() })} placeholder="탐험대 코드 (예: SCH3A7B2C)" style={{ ...inp, marginBottom: 8, fontWeight: 600, letterSpacing: 1 }} />
            <input value={loginForm.name} onChange={e => setLF({ ...loginForm, name: e.target.value })} onKeyDown={e => { if (e.key === "Enter") handleLogin(); }} placeholder={loginForm.role === "teacher" ? "선장 이름" : "대원 이름"} style={{ ...inp, marginBottom: 12 }} />
            <button onClick={handleLogin} style={{ ...bPri, width: "100%" }}>로그인</button>
          </div>
          {/* Register */}
          <div style={{ ...crd, padding: 24, flex: "1 1 320px" }}>
            <h2 style={{ fontSize: 20, fontWeight: 700, margin: "0 0 4px" }}>🌊 탐험대 등록</h2>
            <p style={{ fontSize: 12, color: "#94a3b8", margin: "0 0 16px" }}>교사가 학교를 등록하고 코드를 받습니다</p>
            <input value={schoolForm.schoolName} onChange={e => setSF({ ...schoolForm, schoolName: e.target.value })} placeholder="학교명 (예: 바다초등학교)" style={{ ...inp, marginBottom: 8 }} />
            <input value={schoolForm.teacherName} onChange={e => setSF({ ...schoolForm, teacherName: e.target.value })} onKeyDown={e => { if (e.key === "Enter") createSchool(); }} placeholder="선장 이름 (예: 김대장)" style={{ ...inp, marginBottom: 12 }} />
            <button onClick={createSchool} style={{ ...bPri, width: "100%", background: "linear-gradient(135deg,#3b82f6,#6366f1)" }}>학교 생성하기</button>
            <div style={{ marginTop: 12, padding: 12, background: "#eff6ff", borderRadius: 10, border: "1px solid #bfdbfe", fontSize: 12, color: "#1e40af", lineHeight: 1.5 }}>💡 학교 생성 후 고유 탐험대 코드가 발급됩니다. 이 코드를 학생들에게 공유하세요.</div>
          </div>
        </div>
      </div>
    </div>
  );

  /* ─── STUDENT DIARY ─── */
  if (page === "studentDiary" && currentUser) return (
    <div style={shell}>
      
      <div style={{ padding: "24px 24px 16px", borderBottom: "1px solid #e5e7eb", background: "#fff", display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 12 }}>
        <div>
          <h1 style={{ fontSize: 22, fontWeight: 800, margin: 0 }}>{currentUser.name}대원의 탐험 일지</h1>
          <p style={{ fontSize: 12, color: "#94a3b8", margin: "4px 0 0" }}>{currentUser.schoolName}</p>
        </div>
        <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
          <span style={bdg()}>{currentUser.schoolCode}</span>
          <button onClick={logout} style={bSoft}>로그아웃</button>
        </div>
      </div>
      <div style={{ padding: "20px 24px", maxWidth: 600, margin: "0 auto" }}>
        <DiaryView entries={myEntries} setEntries={setME} save={saveMyEntries} readOnly={false} />
      </div>
    </div>
  );

  /* ─── TEACHER DASH ─── */
  if (page === "teacherDash" && currentUser) return (
    <div style={shell}>
      
      <div style={{ padding: "24px 24px 16px", borderBottom: "1px solid #e5e7eb", background: "#fff", display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 12 }}>
        <div>
          <h1 style={{ fontSize: 22, fontWeight: 800, margin: 0 }}>{currentUser.schoolName}</h1>
          <p style={{ fontSize: 12, color: "#94a3b8", margin: "4px 0 0" }}>교사: {currentUser.teacherName} · 탐험대 코드: <b style={{ color: "#6366f1" }}>{currentUser.schoolCode}</b></p>
        </div>
        <button onClick={logout} style={bSoft}>로그아웃</button>
      </div>
      <div style={{ padding: "20px 24px", maxWidth: 760, margin: "0 auto" }}>
        {msgBox}
        {/* Add student */}
        <div style={{ ...crd, marginBottom: 16 }}>
          <div style={lbl}>🐠 대원 추가</div>
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
            <input value={studentForm.studentName} onChange={e => setStF({ ...studentForm, studentName: e.target.value })} placeholder="대원 이름" style={{ ...inp, flex: "2 1 160px" }} />
            <input value={studentForm.grade} onChange={e => setStF({ ...studentForm, grade: e.target.value })} placeholder="학년" style={{ ...inp, flex: "1 1 80px" }} />
            <input value={studentForm.classNumber} onChange={e => setStF({ ...studentForm, classNumber: e.target.value })} placeholder="반" style={{ ...inp, flex: "1 1 80px" }} />
          </div>
          <button onClick={addStudent} style={{ ...bPri, marginTop: 10 }}>🐠 대원 추가</button>
        </div>
        {/* Bulk add students */}
        <div style={{ ...crd, marginBottom: 16 }}>
          <div style={lbl}>🐟 대원 일괄 등록</div>
          <p style={{ fontSize: 11, color: "#94a3b8", margin: "0 0 10px" }}>대원 수를 입력하면 1번~N번으로 자동 등록됩니다</p>
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap", alignItems: "center" }}>
            <input value={bulkCount} onChange={function(e) { setBulkCount(e.target.value); }} placeholder="대원 수" type="number" min="1" max="50" style={{ ...inp, width: 80, textAlign: "center" }} />
            <span style={{ fontSize: 13, color: "#64748b" }}>명</span>
            <input value={bulkGrade} onChange={function(e) { setBulkGrade(e.target.value); }} placeholder="학년" style={{ ...inp, width: 70 }} />
            <input value={bulkClass} onChange={function(e) { setBulkClass(e.target.value); }} placeholder="반" style={{ ...inp, width: 70 }} />
          </div>
          <button onClick={bulkAddStudents} disabled={!bulkCount} style={{ ...bPri, marginTop: 10, background: "#8b5cf6", opacity: bulkCount ? 1 : 0.4 }}>1번~{bulkCount || "N"}번 일괄 생성</button>
        </div>
        {/* Student list */}
        <div style={{ ...crd, marginBottom: 16 }}>
          <div style={lbl}>🌊 탐험대원 명단 ({myStudents.length}명)</div>
          {myStudents.length === 0 && <p style={{ color: "#94a3b8", fontSize: 13 }}>아직 🌊 탐험대원 명단이 없습니다.</p>}
          {myStudents.map(s => (
            <div key={s.id} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "12px 14px", marginBottom: 6, background: "#f8fafc", borderRadius: 12, border: "1px solid #f1f5f9", flexWrap: "wrap", gap: 8 }}>
              <div>
                <div style={{ fontWeight: 700, fontSize: 14 }}>{s.name}</div>
                {s.grade && <div style={{ fontSize: 12, color: "#94a3b8" }}>{s.grade}학년 {s.classNumber}반</div>}
              </div>
              <div style={{ display: "flex", gap: 6 }}>
                <button onClick={() => viewStudentRecords(s)} style={{ ...bSoft, padding: "6px 12px", fontSize: 12, background: (viewStu && viewStu.id === s.id) ? "#eef2ff" : "#f1f5f9", color: (viewStu && viewStu.id === s.id) ? "#6366f1" : "#475569", border: "1px solid " + ((viewStu && viewStu.id === s.id) ? "#c7d2fe" : "#e2e8f0") }}>항해 일지</button>
                <button onClick={() => clearStuRecords(s)} style={{ ...bSoft, padding: "6px 12px", fontSize: 12, color: "#d97706", border: "1px solid #fde68a", background: "#fffbeb" }}>비우기</button>
                <button onClick={() => delStudent(s)} style={{ ...bDanger, padding: "6px 12px", fontSize: 12 }}>삭제</button>
              </div>
            </div>
          ))}
        </div>
        {/* View records */}
        {viewStu && (
          <div style={crd}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
              <div>
                <div style={lbl}>학생 항해 일지</div>
                <div style={{ fontSize: 16, fontWeight: 700 }}>{viewStu.name} {viewStu.grade && <span style={{ fontSize: 13, color: "#94a3b8", fontWeight: 500 }}>({viewStu.grade}학년 {viewStu.classNumber}반)</span>}</div>
                <div style={{ fontSize: 12, color: "#94a3b8", marginTop: 2 }}>저장된 일기: {viewEntries.length}개</div>
              </div>
              <button onClick={() => { setVS(null); setVE([]); }} style={{ ...bSoft, padding: "6px 12px", fontSize: 12 }}>닫기</button>
            </div>
            <DiaryView entries={viewEntries} setEntries={setVE} save={async (e) => await sSet(dKey(viewStu.id), e)} readOnly={true} />
          </div>
        )}
      </div>
    </div>
  );

  return null;
}
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
</script>
</body>
</html>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Gowun Dodum', 'Jua', -apple-system, system-ui, sans-serif; font-weight: 500; }
#root { min-height: 100vh; }

/* ── Hero ocean overlay animations ── */
@keyframes bubbleRise {
  0%   { transform: translateY(0) translateX(0) scale(0.6); opacity: 0; }
  12%  { opacity: 0.7; }
  60%  { opacity: 0.5; }
  100% { transform: translateY(-560px) translateX(var(--drift, 0px)) scale(0.95); opacity: 0; }
}
@keyframes rayShimmer {
  0%, 100% { opacity: 0.08; transform: scaleX(1); }
  50%      { opacity: 0.28; transform: scaleX(1.35); }
}
@keyframes scrollCue {
  0%, 100% { transform: translateY(0); opacity: 0.45; }
  50%      { transform: translateY(8px); opacity: 1; }
}
@media (prefers-reduced-motion: reduce) {
  .bubble, .light-ray, .scroll-cue { animation: none !important; }
}
.cta-text { transition: color 0.2s ease; }
.cta-text:hover { color: #0369a1; }
.cta-text .arrow { transition: transform 0.2s ease; }
.cta-text:hover .arrow { transform: translateX(5px); }

/* ── 일지 영역 반응형: 모바일은 좁게(가로 스크롤), 데스크탑은 넓게 ── */
.diary-wrap { width: 100%; max-width: 620px; margin: 0 auto; padding: 20px 24px; }
@media (min-width: 820px)  { .diary-wrap { max-width: 880px;  padding: 24px 32px; } }
@media (min-width: 1200px) { .diary-wrap { max-width: 1040px; } }
.diary-tabs { display: flex; gap: 6px; margin-bottom: 8px; overflow-x: auto; padding-bottom: 4px; }
@media (min-width: 820px) { .diary-tabs { overflow-x: visible; flex-wrap: wrap; justify-content: center; } }
.diary-tab { padding: 13px 18px; font-size: 18px; }
.diary-tab-ico { width: 24px; height: 24px; vertical-align: middle; margin-right: 6px; }
.diary-h1 { font-size: 27px; }
.diary-sub { font-size: 14px; }
@media (max-width: 767px) {
  .diary-tab { padding: 10px 16px; font-size: 14px; }
  .diary-tab-ico { width: 16px; height: 16px; margin-right: 4px; }
  .diary-h1 { font-size: 22px; }
  .diary-sub { font-size: 12px; }
}
